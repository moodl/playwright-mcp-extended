name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run fixture tests
        run: node --test test/integration.test.js

  release:
    name: Create GitHub Release
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## Playwright MCP Extended v${{ steps.version.outputs.VERSION }}

            ### Installation

            ```bash
            git clone https://github.com/moodl/playwright-mcp-extended.git
            cd playwright-mcp-extended
            npm install
            ```

            ### MCP Config

            ```json
            {
              "playwright-extended": {
                "command": "node",
                "args": ["<path-to>/playwright-mcp-extended/src/cli.js"]
              }
            }
            ```

            See [README](https://github.com/moodl/playwright-mcp-extended#readme) for full documentation.
          draft: false
          prerelease: false
          generate_release_notes: true

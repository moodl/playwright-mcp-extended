<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Google One-Tap Test Page</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; }
    #credential_picker_container {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 360px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      z-index: 100000;
      padding: 16px;
    }
    #credential_picker_container h3 { margin-top: 0; }
    #credential_picker_container .account {
      display: flex;
      align-items: center;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin: 8px 0;
      cursor: pointer;
    }
    #credential_picker_container .avatar {
      width: 36px;
      height: 36px;
      background: #4285f4;
      border-radius: 50%;
      margin-right: 12px;
    }
  </style>
</head>
<body>
  <h1>Blog Post</h1>
  <p id="content">Article content that should be accessible regardless of the One-Tap prompt.</p>

  <!-- Google One-Tap simulation -->
  <div id="credential_picker_container">
    <h3>Sign in with Google</h3>
    <div class="account">
      <div class="avatar"></div>
      <div>
        <div style="font-weight:bold">user@gmail.com</div>
        <div style="font-size:12px;color:#666">John Doe</div>
      </div>
    </div>
  </div>

  <script>
    const observer = new MutationObserver(function() {
      if (!document.getElementById('credential_picker_container')) {
        document.body.setAttribute('data-onetap-removed', 'true');
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
